# ── Watsonx Model Configuration ─────────────────────────────────────────────
watsonx:
  generation:
    model_id: "ibm/granite-13b-chat-v2"
    parameters:
      max_new_tokens: 1024
      temperature: 0.1
      top_p: 0.9
      repetition_penalty: 1.1
      stop_sequences: ["\n\nHuman:", "\n\nUser:"]

# ── Fraud Detection Model Configuration ─────────────────────────────────────
model:
  ensemble:
    xgboost:
      n_estimators: 500
      max_depth: 8
      learning_rate: 0.05
      subsample: 0.8
      colsample_bytree: 0.8
      scale_pos_weight: 10
      eval_metric: "aucpr"
      random_state: 42
    lightgbm:
      n_estimators: 500
      max_depth: 8
      learning_rate: 0.05
      subsample: 0.8
      colsample_bytree: 0.8
      scale_pos_weight: 10
      metric: "average_precision"
      random_state: 42
    isolation_forest:
      n_estimators: 200
      contamination: 0.02
      random_state: 42
    weights:
      xgboost: 0.40
      lightgbm: 0.40
      isolation_forest: 0.20
  threshold:
    fraud: 0.70
    review: 0.40

# ── Feature Engineering ─────────────────────────────────────────────────────
features:
  velocity:
    windows: [1, 6, 24, 72]  # hours
    aggregations: ["count", "sum", "mean", "std"]
  amount:
    percentiles: [25, 50, 75, 90, 95, 99]
  temporal:
    cyclical: true  # sin/cos encoding for hour/day
  geo:
    max_distance_km: 500  # threshold for geo anomaly

# ── Governance Thresholds ───────────────────────────────────────────────────
governance:
  bias:
    demographic_parity_threshold: 0.10
    equalized_odds_threshold: 0.10
    protected_attributes: ["age_group", "gender", "geography"]
  drift:
    psi_threshold: 0.20
    ks_threshold: 0.05
    monitoring_window_days: 30
  factsheet:
    eu_ai_act_article: "Article 11"
    risk_classification: "High-Risk"
    version: "1.0.0"

# ── Synthetic Data Generation ───────────────────────────────────────────────
synthetic:
  n_transactions: 100000
  fraud_rate: 0.02
  n_merchants: 500
  n_customers: 10000
  seed: 42
